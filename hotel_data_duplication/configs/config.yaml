# llama config test

data:
  # for training split
  input_csv: "../data/hotel_pairs.csv"
  test_size: 0.2
  random_seed: 42

  # for evaluation — these files live in scripts/
  addresses_csv: "../data/addresses_corrected_test.csv"
  inference_labels: "../data/inference_labels_test.csv"
  distance_threshold_m: 500         # meters for geo‑filter

model:
  name_or_path: "meta-llama/Meta-Llama-3-8B-Instruct"  # The Llama generative model
  max_length: 256  # Maximum length of input tokens
  num_labels: 2    # Number of output labels for classification (e.g., binary classification)

lora:
  rank: 8  # LoRA rank for parameter efficient fine-tuning
  alpha: 32  # Scaling factor for LoRA
  target_modules:
    - q_proj
    - v_proj  # Targeting these modules for LoRA
  dropout: 0.05  # Dropout rate for LoRA

training:
  output_dir: "outputs/llama3-dupe"  # Directory for LoRA checkpoints
  epochs: 10  # Number of epochs to train
  val_split: 0.1  # Validation split
  learning_rate: 1e-5  # Learning rate
  weight_decay: 0.01  # Weight decay for regularization
  warmup_ratio: 0.1  # Warm-up ratio for learning rate scheduler
  int8_threshold: 6.0  # Threshold for using int8 precision if needed
  patience: 3  # Early stopping patience
  logging_steps: 50  # Frequency of logging during training
  eval_steps: 200  # Frequency of evaluation during training
  save_total_limit: 3  # Limit the number of saved checkpoints

  use_4bit: true  # Enable 4-bit quantization for reduced memory usage
  use_8bit: false  # Disable 8-bit quantization
  batch_size: 2  # Training batch size
  gradient_accumulation_steps: 8  # Gradient accumulation for large models
  fp16: true  # Use FP16 precision for faster training

inference:
  batch_size: 8  # Batch size for inference
  max_pairs: 500000  # Maximum number of pairs to process
  threshold: 0.5  # Threshold for classifying pairs as similar or not
  save_intermediate_results: true    # Save results every N pairs
  progress_update_frequency: 1000    # Print progress every N pairs
  memory_cleanup_frequency: 50       # Clear memory every N pairs
